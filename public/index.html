<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STORE ONE DRIPE</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
background:#f5f5f5;
color:#222;

}



/* HEADER */

header{

background:#111;
color:white;
padding:30px;
text-align:center;

}


header h1{

margin:0;
font-size:38px;
color:#00d9ff;

}


header p{

color:#ddd;

}





/* NAV */

nav{

background:white;
padding:15px;
text-align:center;

}


nav a{

margin:15px;
text-decoration:none;
color:#111;
font-weight:bold;

}







/* PRODUCTS */

.products{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));

gap:25px;

padding:40px;

}



.card{

background:white;

padding:20px;

border-radius:20px;

box-shadow:0 5px 20px #ddd;

transition:.3s;

}



.card:hover{

transform:translateY(-5px);

}



.card img{

width:100%;

height:260px;

object-fit:cover;

border-radius:15px;

}




.card h2{

font-size:22px;

}



.price{

font-size:24px;

font-weight:bold;

color:#00aaff;

}



.category{

color:#777;

}





.card button{

width:100%;

padding:14px;

background:#111;

color:white;

border:0;

border-radius:10px;

cursor:pointer;

font-size:16px;

}



.card button:hover{

background:#00d9ff;

color:black;

}








/* ORDER BOX */


#orderBox{


display:none;

position:fixed;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:white;

width:320px;

padding:25px;

border-radius:20px;

box-shadow:0 0 30px #555;


}



#orderBox input{


width:100%;

padding:12px;

margin:8px 0;

border:1px solid #ddd;

border-radius:10px;


}



#orderBox button{


width:100%;

padding:12px;

margin-top:10px;

border:0;

border-radius:10px;

cursor:pointer;


}



.send{

background:#00d9ff;

}



.close{

background:red;

color:white;

}




footer{

background:#111;

color:white;

text-align:center;

padding:20px;

margin-top:30px;

}



</style>


</head>




<body>





<header>

<h1>STORE ONE DRIPE</h1>

<p>Votre boutique en ligne</p>


</header>




<nav>

<a href="#">Accueil</a>

<a href="#products">Produits</a>

<a href="#">Contact</a>


</nav>







<h2 style="text-align:center;margin-top:30px">

Nos Produits

</h2>




<div class="products" id="products">


</div>








<div id="orderBox">


<h2>Commande</h2>


<input id="client" placeholder="Nom Client">


<input id="phone" placeholder="Téléphone">


<input id="address" placeholder="Adresse">


<button class="send" onclick="sendOrder()">

Envoyer

</button>



<button class="close" onclick="closeOrder()">

Fermer

</button>


</div>









<footer>

STORE ONE DRIPE © 2026

</footer>









<script>


let selectedProduct="";




// LOAD PRODUCTS


async function loadProducts(){



let res = await fetch("/products");


let products = await res.json();



let html="";



products.forEach(p=>{


html+=`

<div class="card">


<img src="${p.image}">


<h2>${p.name}</h2>


<p class="price">

${p.price} DH

</p>


<p class="category">

${p.category}

</p>



<button onclick="openOrder('${p.name}')">

Commander

</button>


</div>


`;



});



document.getElementById("products").innerHTML=html;


}








function openOrder(product){


selectedProduct=product;


document.getElementById("orderBox").style.display="block";


}






function closeOrder(){


document.getElementById("orderBox").style.display="none";


}








async function sendOrder(){


let order={


client:document.getElementById("client").value,


phone:document.getElementById("phone").value,


address:document.getElementById("address").value,


product:selectedProduct


};



await fetch("/orders",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(order)

}

);



alert("Commande envoyée ✅");


closeOrder();


}







loadProducts();



</script>



</body>

</html>
