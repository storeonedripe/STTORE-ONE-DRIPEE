<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STORE ONE DRIPE ADMIN</title>


<style>

body{

margin:0;
font-family:Arial;
background:#f4f4f4;

}


.sidebar{

position:fixed;
width:230px;
height:100vh;
background:#111;
color:white;
padding:20px;

}


.sidebar h2{

text-align:center;
color:#00d9ff;

}



.sidebar button{

width:100%;
padding:12px;
margin:8px 0;
background:#222;
color:white;
border:0;
border-radius:8px;
cursor:pointer;

}



.content{

margin-left:270px;
padding:30px;

}



.box{

background:white;
padding:25px;
border-radius:15px;

}



input{

width:100%;
padding:12px;
margin:8px 0;

}



.add{

background:#00d9ff;
border:0;
padding:12px 20px;
border-radius:8px;

}



table{

width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;

}



th{

background:#111;
color:white;

}



td,th{

padding:12px;
text-align:center;

}



img{

width:80px;
height:80px;
object-fit:cover;

}



.delete{

background:red;
color:white;
border:0;
padding:8px;

}


</style>

</head>



<body>



<div class="sidebar">


<h2>STORE ONE DRIPE</h2>



<button onclick="showPage('products')">

Ajouter Article

</button>



<button onclick="showPage('orders')">

Commandes Clients

</button>



</div>








<div class="content">






<!-- ARTICLES -->


<div id="products">


<h1>Ajouter Article</h1>



<div class="box">


<input id="name" placeholder="Nom Article">


<input id="price" placeholder="Prix DH">


<input id="category" placeholder="Catégorie">



<input type="file" id="image">





<button class="add" onclick="addProduct()">

Ajouter

</button>


</div>






<h2>Liste Articles</h2>


<table>


<tr>

<th>Image</th>

<th>Nom</th>

<th>Prix</th>

<th>Catégorie</th>

<th>Action</th>


</tr>


<tbody id="productList">

</tbody>


</table>


</div>









<!-- COMMANDES -->


<div id="orders" style="display:none">


<h1>Commandes Clients</h1>


<table>


<tr>

<th>Client</th>

<th>Téléphone</th>

<th>Adresse</th>

<th>Produit</th>

<th>Status</th>


</tr>


<tbody id="ordersList">

</tbody>


</table>



</div>







</div>









<script>





function showPage(page){


document.getElementById("products").style.display="none";


document.getElementById("orders").style.display="none";


document.getElementById(page).style.display="block";


}








// AJOUT PRODUIT


async function addProduct(){



let file =
document.getElementById("image").files[0];



let data = new FormData();



data.append(
"name",
document.getElementById("name").value
);



data.append(
"price",
document.getElementById("price").value
);



data.append(
"category",
document.getElementById("category").value
);



data.append(
"image",
file
);






await fetch(
"/products",
{

method:"POST",

body:data

}

);



alert("Article ajouté");


loadProducts();



}









// AFFICHER PRODUITS


async function loadProducts(){



let res = await fetch("/products");


let products = await res.json();



let html="";



products.forEach(p=>{


html+=`


<tr>


<td>

<img src="${p.image}">

</td>



<td>

${p.name}

</td>



<td>

${p.price} DH

</td>



<td>

${p.category}

</td>



<td>


<button class="delete"

onclick="deleteProduct(${p.id})">

Supprimer

</button>


</td>



</tr>


`;



});



document.getElementById("productList").innerHTML=html;



}









async function deleteProduct(id){



await fetch(

"/products/"+id,

{

method:"DELETE"

}

);



loadProducts();



}









// COMMANDES


async function loadOrders(){



let res=await fetch("/orders");


let orders=await res.json();



let html="";



orders.forEach(o=>{


html+=`


<tr>


<td>${o.client}</td>

<td>${o.phone}</td>

<td>${o.address}</td>

<td>${o.product}</td>

<td>${o.status}</td>


</tr>


`;



});



document.getElementById("ordersList").innerHTML=html;


}








loadProducts();

loadOrders();



</script>



</body>

</html>
